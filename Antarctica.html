@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --primary: #0f4c75;
  --accent: #3282b8;
  --dark: #0a2540;
  --light: #f8f9fa;
  --gray: #6b7280;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Crimson Text', serif;
  line-height: 1.7;
  color: var(--dark);
  background: var(--light);
}

/* HERO */
.hero {
  position: relative;
  height: 75vh;
  min-height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0f4c75 0%, #0a2540 100%);
}

.hero-bg-iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vw;
  height: 100vh;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%) scale(1.1);
  pointer-events: none;
  opacity: 0.35;
  z-index: 0;
}


.hero-bg-iframe iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  color: white;
  max-width: 900px;
  padding: 0 30px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 7vw, 4.5rem);
  font-weight: 900;
  margin-bottom: 15px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.hero-date {
  font-size: 1.2rem;
  opacity: 0.9;
  font-style: italic;
}

nav {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 25px;
  justify-content: center;
  z-index: 10;
  padding: 25px 30px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.05rem;
  transition: all 0.3s ease;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

nav a:hover {
  color: var(--accent);
}


/* CONTENT */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 30px;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--primary);
  margin-bottom: 30px;
  padding-bottom: 15px;
  border-bottom: 3px solid var(--accent);
}

.story-text {
  font-size: 1.15rem;
  line-height: 1.8;
  margin-bottom: 50px;
  max-width: 800px;
}

/* IMAGE GRID */
.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 30px;
  margin: 50px 0;
}

.image-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

.image-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.image-frame {
  width: 100%;
  aspect-ratio: 4 / 3;
  position: relative;
  overflow: hidden;
}

.image-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.image-caption {
  padding: 15px;
  background: white;
  font-size: 1rem;
  color: var(--gray);
  font-style: italic;
  text-align: center;
}

/* FOOTER */
footer {
  background: var(--dark);
  color: white;
  padding: 40px 30px;
  text-align: center;
}

footer a {
  color: white;
  text-decoration: none;
}

footer a:hover {
  color: var(--accent);
}

@media (max-width: 768px) {
  nav {
    flex-wrap: wrap;
    gap: 12px;
    padding: 15px;
  }
  
  nav a {
    font-size: 0.95rem;
  }
  
  .hero-content {
    padding-top: 80px;
  }
  
  .image-grid {
    grid-template-columns: 1fr;
  }
}
