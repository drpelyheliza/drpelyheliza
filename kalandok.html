<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --primary: #0f4c75;
  --accent: #3282b8;
  --dark: #0a2540;
  --light: #f8f9fa;
  --gray: #6b7280;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Crimson Text', serif;
  line-height: 1.7;
  color: var(--dark);
  background: var(--light);
}

/* HERO */
.hero {
  position: relative;
  height: 75vh;
  min-height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0f4c75 0%, #0a2540 100%);
}

.hero-bg-iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vw;
  height: 100vh;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%) scale(1.1);
  pointer-events: none;
  opacity: 0.35;
  z-index: 0;
}

.hero-bg-iframe iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  color: white;
  max-width: 900px;
  padding: 0 30px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 7vw, 4.5rem);
  font-weight: 900;
  margin-bottom: 20px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.hero p {
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  opacity: 0.95;
  font-style: italic;
  margin-bottom: 50px;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 50px;
  flex-wrap: wrap;
  margin-top: 40px;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  font-weight: 700;
  color: white;
  display: block;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.stat-label {
  font-size: 1.1rem;
  color: white;
  margin-top: 10px;
  opacity: 0.9;
}

/* NAV */
nav {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 25px;
  justify-content: center;
  z-index: 10;
  padding: 25px 30px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.05rem;
  transition: all 0.3s ease;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

nav a:hover {
  color: var(--accent);
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 6vw, 4rem);
  text-align: center;
  margin-bottom: 40px;
  font-weight: 700;
}

/* MAP SECTION */
.map-section {
  padding: 80px 30px 100px;
  background: white;
}

#map {
  height: 700px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

.popup-list {
  margin: 0;
  padding: 0;
}

.popup-list li {
  list-style: none;
  margin: 4px 0;
}

/* FOOTER */
footer {
  background: var(--dark);
  color: white;
  padding: 40px 30px;
  text-align: center;
}

footer a {
  color: white;
  text-decoration: none;
}

footer a:hover {
  color: var(--accent);
}

@media (max-width: 768px) {
  nav {
    flex-wrap: wrap;
    gap: 12px;
    padding: 15px;
  }
  
  nav a {
    font-size: 0.95rem;
  }
  
  .hero-content {
    padding-top: 80px;
  }
  
  .stats {
    gap: 30px;
  }
  
  #map {
    height: 500px;
  }
}
</style>
</head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7ZN25955BY"></script>

  window.dataLayer = window.dataLayer || [];

<body>

<!-- HERO -->
<section class="hero">
  <nav>
    <a href="index.html">Főoldal</a>
    <a href="kalandok.html">Kalandok</a>
    <a href="szakmai.html">Szakmai oldal</a>
  </nav>
  
  <div class="hero-bg-iframe">
    <iframe src="https://drive.google.com/file/d/1_UhLBZp1IS8UypOtwJJr0L4I5UOD0NUF/preview" allow="autoplay"></iframe>
  </div>
  
  <div class="hero-content">
    <h1>Kalandok</h1>
    <p>Minden jelölő egy utazás története</p>
    
    <div class="stats">
      <div class="stat-item">
        <span class="stat-number">7</span>
        <span class="stat-label">Kontinens</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">10+</span>
        <span class="stat-label">Év utazás</span>
      </div>
    </div>
    
    <p style="margin-top: 30px; font-size: 1.15rem; opacity: 0.9;">Kattints a térképre és fedezd fel az útjaimat</p>
  </div>
</section>

<!-- MAP -->
<section class="map-section">
  <div class="container">
    <h2 class="section-title" style="color: var(--primary);">Interaktív térkép</h2>
    <p style="text-align: center; font-size: 1.2rem; margin-bottom: 40px; color: var(--gray);">Kattints a jelölőkre és fedezd fel az útjaimat</p>
    <div id="map"></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2025 Dr. Pelyhe Liza • <a href="mailto:lizapelyhe.dr@mensa.hu">lizapelyhe.dr@mensa.hu</a>
</footer>

<script>
// Map initialization
var map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function coloredMarker(color) {
  return L.icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-" + color + ".png",
    shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png",
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
  });
}

var sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjCh-oDJvW3IjGadO36DJ5QgIvvMGwpunzTNQM3PZzTCLPQLebDCXfowxMDzRHm_aScnxqYXdUBCwt/pub?output=csv";

Papa.parse(sheetUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    var grouped = {};
    
    results.data.forEach(function(row) {
      if (row.Country && row.Latitude && row.Longitude) {
        var key = row.Country + "_" + row.Latitude + "_" + row.Longitude;
        if (!grouped[key]) {
          grouped[key] = {
            country: row.Country,
            lat: parseFloat(row.Latitude),
            lon: parseFloat(row.Longitude),
            posts: [],
            color: row.Color ? row.Color.toLowerCase() : "blue"
          };
        }
        grouped[key].posts.push({
          title: row["Blog Title"],
          url: row.URL
        });
      }
    });
    
    Object.values(grouped).forEach(function(place) {
      var popupContent = "<b>" + place.country + "</b><ul class='popup-list'>";
      place.posts.forEach(function(post) {
        popupContent += "<li><a href='" + post.url + "' target='_blank'>" + post.title + "</a></li>";
      });
      popupContent += "</ul>";
      
      L.marker([place.lat, place.lon], { icon: coloredMarker(place.color) })
        .addTo(map)
        .bindPopup(popupContent);
    });
  }
});
</script>

</body>
</html>
